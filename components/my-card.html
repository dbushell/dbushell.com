<script context="component">
  const tag = typeof heading === 'undefined' ? 'h3': heading;
  const sub = typeof subtitle === 'undefined' ? false : true;
</script>

<article class="Card">
  <ssr-element tag="{{tag}}">
    <span class="Star">
      <ssr-if condition="href">
        <a href="{{href}}">{{title}}</a>
        <ssr-else>
        {{title}}
      </ssr-if>
    </span>
    <ssr-if condition="sub">
      <span class="Cursive">{{subtitle}}</span>
    </ssr-if>
  </ssr-element>
  <div>
    <ssr-slot />
  </div>
</article>
