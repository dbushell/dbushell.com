<!DOCTYPE html>
<html class="Document Noscript Lightmode" dir="ltr" lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preload" as="font" href="/assets/fonts/komika-title.woff2" type="font/woff2" crossorigin>
<link rel="preload" as="font" href="/assets/fonts/raleway-variable.woff2" type="font/woff2" crossorigin>
<link rel="preload" as="font" href="/assets/fonts/comic-neue-bold-italic.woff2" type="font/woff2" crossorigin>
<link rel="modulepreload" href="/assets/js/app.min.js?v={{version}}">
<link rel="canonical" href="https://dbushell.com{{href}}">
<title>{{title}}</title>
<link rel="manifest" href="/manifest.webmanifest?v={{version}}">
<link rel="apple-touch-icon" href="/assets/icons/180x180.png">
<link rel="icon" href="/assets/icons/favicon.svg">
<link rel="mask-icon" href="/assets/icons/mask-icon.svg" color="#96e6c8">
<meta name="apple-mobile-web-app-title" content="David Bushell">
<meta name="application-name" content="David Bushell">
<meta name="generator" content="{{generator}} | https://github.com/dbushell/dbushell.com">
<meta name="theme-color" content="#fffaf0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#4f4545" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#96e6c8">
<meta property="og:title" content="{{title}}">
<meta property="og:url" content="https://dbushell.com{{href}}">
<meta property="og:description" content="{{description}}">
<meta property="og:image" content="https://dbushell.com/assets/icons/512x512.png">
<meta property="og:site_name" content="dbushell.com">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@dbushell">
<meta name="twitter:title" content="{{title}}">
<meta name="twitter:description" content="{{description}}">
<meta name="twitter:image" content="https://dbushell.com/assets/icons/512x512.png">
<link rel="alternate" type="application/rss+xml" title="dbushell.com RSS Feed" href="https://dbushell.com/rss.xml">
<style type="text/css" data-hash="{{cssHash}}">{{cssData}}</style>
<script data-hash="{{headHash}}">{{headData}}</script>
</head>
<body class="Body">
<div class="App">{{render}}</div>
<p class="Kofi-button">
  <a href="/tip/" rel="me noopener noreferrer" target="_blank">
    <span>Buy me a coffee!</span>
    <img alt="Support me on Ko-fi" width="152" height="100" src="/images/blog/2024/kofi_logo.png">
  </a>
</p>
<script async type="module" src="/assets/js/app.min.js?v={{version}}"></script>
</body>
</html>
