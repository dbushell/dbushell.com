on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
      - name: Fetch LFS
        env:
          LFS_ACCESS_KEY: ${{ secrets.LFS_ACCESS_KEY }}
          LFS_SECRET_KEY: ${{ secrets.LFS_SECRET_KEY }}
          LFS_ENDPOINT: ${{ secrets.LFS_ENDPOINT }}
        run: |
          echo -e "[lfs]\n\turl = https://${LFS_ACCESS_KEY}:${LFS_SECRET_KEY}@${LFS_ENDPOINT}" > .lfsconfig
          git lfs env
          git lfs fetch --all && git lfs checkout

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Build Deno
        run: deno task build

      - name: Publish
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: build
          wranglerVersion: '3'
